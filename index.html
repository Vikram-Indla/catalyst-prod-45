<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- 2026-06-09 ADS lockdown — CSP font-src/style-src allowlist.
         Browser-level block: any font request to a non-Atlassian CDN is
         refused with a console error and the request fails. Paired with
         design-governance/rules/font-import-enforcer.js (build-time gate)
         + CLAUDE.md "FONTS BANNED EXCEPT ADS" P0 rule. localhost is
         allowed for Vite HMR style injection in dev; chromatic.com is
         allowed for Storybook MCP iframe styles. -->
    <meta http-equiv="Content-Security-Policy" content="font-src 'self' data: https://ds-cdn.prod-east.frontend.public.atl-paas.net https://*.atl-paas.net https://*.atlassian.com https://*.atlassian.design; style-src 'self' 'unsafe-inline' https://*.atl-paas.net https://*.atlassian.com https://*.atlassian.design https://*.chromatic.com http://localhost:* ws://localhost:*">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalyst</title>
    <meta name="description" content="Catalyst — Enterprise Portfolio Management">
    <meta name="author" content="Lovable" />
    
    <!-- 2026-06-09 Vikram compliance — removed fonts.googleapis.com links
         (IBM Plex Sans Arabic + Noto Naskh Arabic). Non-Atlassian CDN
         banned. Atlassian Sans (loaded below) supports multi-script via
         system fallback; if Arabic glyph quality regresses, install
         @fontsource/ibm-plex-sans-arabic for self-host bundle. -->

    <!-- Atlassian DS fonts — official Atlassian CDN.
         Atlassian Sans (v4) is the canonical Jira face. The codebase declares
         it in --ds-font-family-* but no @font-face was loading it, so the
         browser silently fell back to system ui-sans-serif. The 2026-05-17
         design-critique canvas-measure probe caught the drift: Catalyst's
         "For you" heading was 81.36px wide vs Jira's 84.14px because of the
         font substitution. Loading Atlassian Sans here restores parity. -->
    <link rel="preconnect" href="https://ds-cdn.prod-east.frontend.public.atl-paas.net" crossorigin>
    <style>
      @font-face {
        font-family: 'Atlassian Sans';
        src: url('https://ds-cdn.prod-east.frontend.public.atl-paas.net/assets/fonts/atlassian-sans/v4/AtlassianSans-latin.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Atlassian Sans';
        src: url('https://ds-cdn.prod-east.frontend.public.atl-paas.net/assets/fonts/atlassian-sans/v4/AtlassianSans-latin-ext.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
        unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: 'Charlie Display';
        src: url('https://ds-cdn.prod-east.frontend.public.atl-paas.net/assets/fonts/charlie-display/v1/CharlieDisplay-latin.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Charlie Text';
        src: url('https://ds-cdn.prod-east.frontend.public.atl-paas.net/assets/fonts/charlie-text/v1/CharlieText-latin.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Charlie Code';
        src: url('https://ds-cdn.prod-east.frontend.public.atl-paas.net/assets/fonts/charlie-code/v1/CharlieCode-latin.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

    <!-- No-flash theme initialization - MUST run before React.
         Rule 2 (DARK_MODE_HANDOFF): Catalyst owns ONLY the `.dark` class.
         `data-theme` is owned by Atlaskit's setGlobalTheme — never set it here. -->
    <script>
      (function() {
        var t = localStorage.getItem('catalyst-theme');
        var isDark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

    <!-- ADS contrast probe — load on demand only.
         To run: open the browser console and execute window.__catalystContrastProbe()
         Source: public/_audit-contrast-probe.js (mirror of audit/contrast-probe.js) -->
    <script src="/_audit-contrast-probe.js" defer></script>
