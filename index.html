    <!-- No-flash theme initialization - MUST run before React.
         Rule 2 (DARK_MODE_HANDOFF): Catalyst owns ONLY the `.dark` class.
         `data-theme` is owned by Atlaskit's setGlobalTheme — never set it here. -->
    <script>
      (function() {
        var t = localStorage.getItem('catalyst-theme');
        var isDark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

    <!-- TEMP: ADS contrast probe auto-runner (remove after Wave verification) -->
    <script src="/_audit-contrast-probe.js"></script>
    <script>
      (function () {
        var qs = new URLSearchParams(window.location.search);
        var force = qs.get('probe');
        if (force === 'dark') document.documentElement.classList.add('dark');
        if (force === 'light') document.documentElement.classList.remove('dark');
        window.addEventListener('load', function () {
          setTimeout(function () {
            try {
              var r = window.__catalystContrastProbe && window.__catalystContrastProbe();
              if (r) console.log('[CONTRAST_PROBE]', JSON.stringify(r));
            } catch (e) { console.error('[CONTRAST_PROBE_ERR]', e); }
          }, 3000);
        });
      })();
    </script>
