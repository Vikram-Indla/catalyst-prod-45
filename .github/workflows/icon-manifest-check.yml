name: Icon Manifest Check

# RESET ICONS — hard gating for the canonical icon library.
# Runs on every PR that touches src/assets/icons/** or the registry.
# Fails the build if:
#   - Any file in src/assets/icons/** is missing from manifest.json
#   - Any manifest entry points to a missing file
#   - Any work-type or priority SVG has viewBox != "0 0 20 20"
#   - Any SVG contains <script>, <style>, or <image> (embedded raster)
#   - manifest.json is malformed JSON

on:
  pull_request:
    paths:
      - 'src/assets/icons/**'
      - 'src/components/icons/**'
      - 'scripts/validate-icon-manifest.mjs'
      - '.github/workflows/icon-manifest-check.yml'
  push:
    branches:
      - main
    paths:
      - 'src/assets/icons/**'
      - 'src/components/icons/**'
      - 'scripts/validate-icon-manifest.mjs'

jobs:
  validate:
    name: Validate icon manifest + assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run icon manifest validator
        run: node scripts/validate-icon-manifest.mjs

      - name: Confirm registry imports compile
        run: |
          # Type-check the icon library in isolation. If a manifest entry
          # was added but the registry wasn't updated, tsc will catch the
          # missing ?url import here.
          npx tsc --noEmit -p tsconfig.json 2>&1 | grep -E "src/components/icons|src/assets/icons" || true
          npx tsc --noEmit -p tsconfig.json
