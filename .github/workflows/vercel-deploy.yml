name: Vercel Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_Du0X963eQg3ApToexQcuPwnr
  VERCEL_PROJECT_ID: prj_SyNNCEXxBmGSqlWNs9uYTQJ4403W

jobs:
  gate-check:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check production deploy gate
        id: check
        run: |
          RESPONSE=$(curl -sf \
            "${SUPABASE_URL}/rest/v1/deploy_gate?select=production_deploy_enabled&id=eq.1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Accept: application/json" 2>/dev/null \
            || echo '[{"production_deploy_enabled":true}]')
          ENABLED=$(echo "$RESPONSE" | jq -r '.[0].production_deploy_enabled // true')
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          if [ "$ENABLED" = "false" ]; then
            echo "::notice::🚫 Production deploy gate is OFF. Deploy skipped. Enable at /admin/connections/vercel"
          else
            echo "::notice::✅ Deploy gate is ON. Proceeding with production deploy."
          fi
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

  deploy:
    needs: gate-check
    if: needs.gate-check.outputs.enabled != 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_ENABLE_FILTER_TO_KANBAN: "true"
          VITE_ENABLE_FILTER_TO_ROADMAP: "true"
          VITE_ENABLE_FILTER_TO_DASHBOARD: "true"
          VITE_ENABLE_FILTER_WHATSAPP_AI_SUMMARY: "true"
          VITE_VOICE_DICTATION_ENABLED: "true"
        run: bun run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Create Vercel output structure
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "src": "/assets/(.*)", "dest": "/assets/$1" },
              { "src": "/(.*\\.(js|css|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|webp|avif|mp4|webm|json))", "dest": "/$1" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
