name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # npm ci fails with EBADPLATFORM on linux/x64 for optional darwin-arm64
        # rolldown bindings (npm 10 regression — optional packages should warn,
        # not error, on platform mismatch). npm install correctly skips them.
        #
        # --legacy-peer-deps=false overrides the project-wide .npmrc
        # (legacy-peer-deps=true). With legacy-peer-deps enabled on Linux + npm
        # 10/11, direct devDeps that are ALSO reachable as transitives (e.g.
        # rollup via vite) get silently dropped from node_modules — vite then
        # crashes at build with ERR_MODULE_NOT_FOUND: rollup. Disabling it for
        # CI install only keeps local dev unaffected.
        # --include=dev is explicit insurance against any prod-mode inference.
        run: npm install --legacy-peer-deps=false --include=dev

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true  # Remove once strictNullChecks is enabled

      - name: Lint (hub-scope ADS + lucide-react ban — warn during migration)
        run: npm run lint
        continue-on-error: true  # Tighten to fail-on-warn once swept files
                                 # are promoted to error tier in eslint.config.js

      - name: Build
        run: npx vite build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Run tests
        run: npx vitest run --passWithNoTests
