name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No dependency cache: the repo intentionally ships no lockfile
          # (npm install is used, not npm ci — see "Install dependencies"
          # below). `cache: 'npm'` hard-fails setup-node when no lockfile
          # exists, so it is omitted.

      - name: Install dependencies
        # npm ci fails with EBADPLATFORM on linux/x64 for optional darwin-arm64
        # rolldown bindings (npm 10 regression — optional packages should warn,
        # not error, on platform mismatch). npm install correctly skips them.
        run: npm install

      - name: Pre-warm sync-deps cache (prevents vite.config.ts from re-installing during build)
        # vite.config.ts spawns scripts/sync-deps.js on load. If the
        # node_modules/.catalyst-sync-hash file doesn't exist yet, sync-deps
        # runs `npm install` and WIPES any explicit installs we did in
        # subsequent steps (e.g. the rollup hoist below). Running it once
        # here writes the hash file so the build step takes the fast path.
        run: node scripts/sync-deps.js

      - name: Ensure rollup is hoisted (legacy-peer-deps drops direct devDeps reachable as transitives)
        # With legacy-peer-deps=true in .npmrc, npm 10/11 on Linux silently
        # drops direct devDeps that are also reachable as transitive deps
        # (e.g. rollup via vite). The lockfile pins rollup at the top level
        # but `npm install` skips it. Result: `npx vite build` crashes with
        # ERR_MODULE_NOT_FOUND: rollup.
        # legacy-peer-deps=true is REQUIRED by the project (react-intl-next
        # version conflict between @atlaskit/editor-core peers and root deps
        # — can't be removed without unrelated upstream pin work), so we
        # can't disable it project-wide.
        # Fix: do a targeted second install of just rollup after the main
        # one. This forces rollup to land at node_modules/rollup at the top
        # level where vite's chunked import can find it.
        # NOTE: must run AFTER the sync-deps warm-up, otherwise sync-deps
        # will undo it when vite loads.
        run: npm install rollup@^4.20.0 --no-save

      - name: Type check
        # Root `tsc --noEmit` is a no-op (project-references config compiles
        # nothing). Point at the app project so app-code type errors surface.
        run: npx tsc -p tsconfig.app.json --noEmit
        continue-on-error: true  # ~157 baseline errors; remove continue-on-error
                                 # once the baseline is burned down.

      - name: Lint (hub-scope ADS + lucide-react ban — warn during migration)
        run: npm run lint
        continue-on-error: true  # Tighten to fail-on-warn once swept files
                                 # are promoted to error tier in eslint.config.js

      - name: ADS color ratchet (blocks on NEW hard-coded colors)
        # Fails only when the hard-coded-color count exceeds the committed
        # baseline (design-governance/color-baseline.json). Existing debt does
        # not block; regressions do. CAT-ADS-COMPLIANCE-20260627-001.
        run: npm run lint:colors:gate

      - name: ADS audit ratchet (blocks on NEW tokens/typography/spacing violations)
        # Per-category fail-on-increase over the design-governance audit vs
        # design-governance/audit-baseline.json. CAT-ADS-COMPLIANCE-20260627-001.
        run: npm run audit:ads:gate

      - name: Build
        run: npx vite build
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

      - name: Run tests
        run: npx vitest run --passWithNoTests
