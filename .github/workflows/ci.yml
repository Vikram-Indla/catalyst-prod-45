name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true  # Remove once strictNullChecks is enabled

      - name: Lint (hub-scope ADS + lucide-react ban — warn during migration)
        run: npm run lint
        continue-on-error: true  # Tighten to fail-on-warn once swept files
                                 # are promoted to error tier in eslint.config.js

      - name: Build
        run: npx vite build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Run tests
        run: npx vitest run --passWithNoTests
