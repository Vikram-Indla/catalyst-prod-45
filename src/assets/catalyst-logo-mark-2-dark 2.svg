<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Catalyst Logo Mark - Dark Mode Variant -->
  
  <defs>
    <linearGradient id="catalystBlueDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  
  <!-- Connection lines -->
  <line x1="32" y1="32" x2="12" y2="12" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="52" y2="12" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="12" y2="52" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="52" y2="52" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Outer nodes -->
  <circle cx="12" cy="12" r="8" fill="url(#catalystBlueDark)"/>
  <circle cx="52" cy="12" r="8" fill="url(#catalystBlueDark)"/>
  <circle cx="12" cy="52" r="8" fill="url(#catalystBlueDark)"/>
  <circle cx="52" cy="52" r="8" fill="url(#catalystBlueDark)"/>
  
  <!-- Center hub -->
  <circle cx="32" cy="32" r="12" fill="url(#catalystBlueDark)"/>
  <circle cx="32" cy="32" r="6" fill="#0A0A0A"/>
  
</svg>