<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Crown button -->
  <rect x="10.5" y="1" width="3" height="3.5" rx="1" fill="#0C7A6D"/>
  <!-- Stopwatch body -->
  <circle cx="12" cy="14" r="8.5" fill="#0C7A6D"/>
  <!-- Minute hand — 12 o'clock -->
  <line x1="12" y1="14" x2="12" y2="7.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Second hand — ~1:30 position (45°) -->
  <line x1="12" y1="14" x2="15.8" y2="10.2" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Center pivot dot -->
  <circle cx="12" cy="14" r="1.1" fill="white"/>
</svg>
