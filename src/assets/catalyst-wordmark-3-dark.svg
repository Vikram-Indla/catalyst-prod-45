<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Catalyst Wordmark - Dark Mode Variant -->
  
  <defs>
    <!-- 2026-04-19 (v2): Wordmark-specific dark palette. Mirrors the light
         wordmark's airier approach — see catalyst-wordmark-3.svg for the
         split-strategy rationale. Lifted to Jira's dark-mode display range
         (#85B8FF Blue-300 → #579DFF Blue-500) so the wordmark reads as
         "illuminated blue" against #0A0A0A rather than dense/painful. The
         logo-mark-2-dark + favicon-dark assets keep the deeper #579DFF →
         #2684FF range because favicon size needs the punch. -->
    <linearGradient id="catalystBlueDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#85B8FF"/>
      <stop offset="100%" stop-color="#579DFF"/>
    </linearGradient>
  </defs>
  
  <!-- Umbrella Arc -->
  <path 
    d="M8 22C8 10 22 4 42 4C62 4 76 10 76 22" 
    stroke="url(#catalystBlueDark)" 
    stroke-width="5" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- C Letterform -->
  <path 
    d="M68 38C68 28 56 22 42 22C24 22 12 32 12 48C12 64 24 74 42 74C56 74 68 68 68 58" 
    stroke="url(#catalystBlueDark)" 
    stroke-width="7" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- "atalyst" text in white for dark backgrounds -->
  <text 
    x="82" 
    y="62" 
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
    font-size="52" 
    font-weight="700" 
    fill="#EDEDED" 
    letter-spacing="-1"
  >atalyst™</text>
  
</svg>