<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Catalyst Wordmark - Dark Mode Variant -->
  
  <defs>
    <!-- 2026-04-19: Lifted to Jira's dark-theme blue ramp. Previous stops
         (#60A5FA → #3B82F6) read near-cyan at favicon size because both
         stops were already on the pale side of blue. Jira's dark-mode blues
         (#579DFF → #2684FF) retain saturation on a #0A0A0A surface while
         staying recognisably "blue" — not cyan, not indigo. -->
    <linearGradient id="catalystBlueDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#579DFF"/>
      <stop offset="100%" stop-color="#2684FF"/>
    </linearGradient>
  </defs>
  
  <!-- Umbrella Arc -->
  <path 
    d="M8 22C8 10 22 4 42 4C62 4 76 10 76 22" 
    stroke="url(#catalystBlueDark)" 
    stroke-width="5" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- C Letterform -->
  <path 
    d="M68 38C68 28 56 22 42 22C24 22 12 32 12 48C12 64 24 74 42 74C56 74 68 68 68 58" 
    stroke="url(#catalystBlueDark)" 
    stroke-width="7" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- "atalyst" text in white for dark backgrounds -->
  <text 
    x="82" 
    y="62" 
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
    font-size="52" 
    font-weight="700" 
    fill="#EDEDED" 
    letter-spacing="-1"
  >atalyst™</text>
  
</svg>