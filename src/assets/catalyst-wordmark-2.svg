<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Catalyst Wordmark - Umbrella-C + "atalyst" - LIGHT MODE -->
  
  <defs>
    <linearGradient id="catalystBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  
  <!-- Umbrella Arc (Protective Canopy) -->
  <path 
    d="M8 22C8 10 22 4 42 4C62 4 76 10 76 22" 
    stroke="url(#catalystBlue)" 
    stroke-width="5" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- C Letterform -->
  <path 
    d="M68 38C68 28 56 22 42 22C24 22 12 32 12 48C12 64 24 74 42 74C56 74 68 68 68 58" 
    stroke="url(#catalystBlue)" 
    stroke-width="7" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- "atalyst" text -->
  <text 
    x="82" 
    y="62" 
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
    font-size="52" 
    font-weight="700" 
    fill="url(#catalystBlue)" 
    letter-spacing="-1"
  >atalyst<tspan font-size="24" baseline-shift="super" dy="-8">™</tspan></text>
  
</svg>
