<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Catalyst Wordmark - Umbrella-C + "atalyst" - LIGHT MODE -->
  
  <defs>
    <!-- 2026-04-19 (v2): Wordmark-specific palette. First pass used Atlassian
         Primary → Deep (#0052CC → #0747A6) but that read "painful" at the
         30px display size — too saturated and dark against white chrome.
         Split-strategy: keep Primary/Deep on favicon + mark-only assets where
         small-size punch is the priority, but use Jira's wordmark range
         (#2684FF Jira Product Blue → #0052CC Primary) here. Airy start stop
         gives the wordmark lift at display size; Primary anchor prevents
         drift to cyan. -->
    <linearGradient id="catalystBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2684FF"/>
      <stop offset="100%" stop-color="#0052CC"/>
    </linearGradient>
  </defs>
  
  <!-- Umbrella Arc (Protective Canopy) -->
  <path 
    d="M8 22C8 10 22 4 42 4C62 4 76 10 76 22" 
    stroke="url(#catalystBlue)" 
    stroke-width="5" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- C Letterform -->
  <path 
    d="M68 38C68 28 56 22 42 22C24 22 12 32 12 48C12 64 24 74 42 74C56 74 68 68 68 58" 
    stroke="url(#catalystBlue)" 
    stroke-width="7" 
    stroke-linecap="round" 
    fill="none"
  />
  
  <!-- "atalyst" text -->
  <text 
    x="82" 
    y="62" 
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
    font-size="52" 
    font-weight="700" 
    fill="url(#catalystBlue)" 
    letter-spacing="-1"
  >atalyst™</text>
  
</svg>
