<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Catalyst Convergence Hub Logo - Dark Mode -->
    <defs>
        <linearGradient id="catalystBlueDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa"/>
            <stop offset="100%" style="stop-color:#3b82f6"/>
        </linearGradient>
    </defs>
    <!-- Connection lines (brighter for dark bg) -->
    <line x1="50" y1="50" x2="22" y2="22" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="78" y2="22" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="22" y2="78" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="78" y2="78" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
    <!-- Outer nodes -->
    <circle cx="22" cy="22" r="12" fill="url(#catalystBlueDark)"/>
    <circle cx="78" cy="22" r="12" fill="url(#catalystBlueDark)"/>
    <circle cx="22" cy="78" r="12" fill="url(#catalystBlueDark)"/>
    <circle cx="78" cy="78" r="12" fill="url(#catalystBlueDark)"/>
    <!-- Center hub -->
    <circle cx="50" cy="50" r="18" fill="url(#catalystBlueDark)"/>
    <circle cx="50" cy="50" r="9" fill="#0f172a"/>
</svg>
