<style>.cf{transform-box:fill-box;transform-origin:50% 55%;animation:cfB 3.6s ease-in-out infinite;transition:transform .4s cubic-bezier(.3,1.7,.4,1)}@keyframes cfB{0%,100%{transform:scale(.9)}50%{transform:scale(.95)}}.cf-eyes{transition:opacity .15s ease}.cf-ears{transform-box:fill-box;transform-origin:50% 100%;transition:transform .22s cubic-bezier(.34,1.6,.4,1)}.cf-tail{transform-box:fill-box;transform-origin:0% 100%;transition:transform .24s cubic-bezier(.34,1.7,.4,1)}svg:hover .cf,svg.is-awake .cf,svg.is-excited .cf{animation:none;transform:scale(1.05)}svg:hover .cf-sleep,svg.is-awake .cf-sleep,svg.is-excited .cf-sleep{opacity:0}svg:hover .cf-awake,svg.is-awake .cf-awake{opacity:1}svg:hover .cf-ears,svg.is-awake .cf-ears,svg.is-excited .cf-ears{transform:scaleY(1.28)}svg:hover .cf-tail,svg.is-awake .cf-tail,svg.is-excited .cf-tail{transform:rotate(-20deg)}svg:active .cf,svg.is-excited .cf{transform:scale(1.12)}svg:active .cf-sleep,svg:active .cf-awake,svg.is-excited .cf-sleep,svg.is-excited .cf-awake{opacity:0}svg:active .cf-excited,svg.is-excited .cf-excited{opacity:1}@media(prefers-reduced-motion:reduce){.cf{animation:none;transform:scale(1)}}</style>
