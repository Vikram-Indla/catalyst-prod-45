version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - Atlaskit
  - Supabase
routes:
  - path: /project-hub/BAU/allwork
    file: src/pages/project-hub/jira-list/components/AllWorkToolbar.tsx
    auth_required: true
    description: All work items list view with issue detail panel
  - path: /project-hub/:projectKey/allwork
    file: src/pages/project-hub/jira-list/components/AllWorkToolbar.tsx
    auth_required: true
    description: Project all-work list with sidebar detail panel
features:
  - name: Description Section - ADF Content Styling
    description: Canonical description section for all CatalystView* components. Injects global styles for ADF content rendering with Jira-parity typography (14px/400/24px line-height). Includes click-to-edit with Atlaskit editor, image upload via paste/drop/toolbar button, and expand/collapse toggle.
    files:
      - src/components/catalyst-detail-views/shared/sections/CatalystDescriptionSection.tsx
    entry_route: /project-hub/BAU/allwork?issue=BAU-5609
    user_interactions:
      - Click description area to enter edit mode
      - Type text in the Atlaskit editor
      - Click Save to persist description
      - Click Cancel to discard changes
      - Click collapse/expand chevron to toggle section
      - Paste image into editor to upload attachment
      - Click Image button in editor toolbar to open file picker
    api_calls:
      - method: POST
        endpoint: /storage/v1/object/description-images
    auth_required: true

  - name: Dark-Theme Select Input Fix
    description: Fixes black bar artifact before None text in react-select sidebar fields (Fix versions, Labels, Assignee, Reporter, Priority) in dark mode. The global dark stylesheet was setting rgb(10,10,10) background on inputs. Fixed by prefixing selectors with .dark to match specificity.
    files:
      - src/components/catalyst-detail-views/shared/sections/CatalystDescriptionSection.tsx
    entry_route: /project-hub/BAU/allwork?issue=BAU-5609
    user_interactions:
      - View Fix versions field showing None with no black bar artifact
      - View Labels field showing None with no black bar artifact
      - Click Fix versions dropdown to open selector
      - Click Labels dropdown to open selector
    api_calls: []
    auth_required: true

  - name: Workflow Viewer Modal
    description: Modal that shows the workflow diagram for a given issue type. Uses useWorkflows() hook with null guard. Renders a linear state chain with arrows, verb labels, and highlights current status.
    files:
      - src/components/catalyst-detail-views/shared/sections/WorkflowViewerModal.tsx
    entry_route: /project-hub/BAU/allwork?issue=BAU-5609
    user_interactions:
      - Click status pill to open status popover
      - Click View workflow link in the popover
      - View workflow diagram with state nodes and arrows
      - Click Close button to dismiss the modal
    api_calls: []
    auth_required: true

  - name: SubtasksPanel - List-Only View
    description: Child issues panel for Story detail view. List-only - no board/toggle (Jira parity). JiraTable with Type, Key, Summary, Assignee, Status, Fix Versions, Priority columns. Supports inline create, bulk edit, sort, column picker, keyboard navigation.
    files:
      - src/modules/project-work-hub/components/SubtasksPanel/index.tsx
    entry_route: /project-hub/BAU/allwork?issue=BAU-5609
    user_interactions:
      - View subtasks list in JiraTable format
      - Confirm no list/board toggle button exists in the header
      - Click + button to create a subtask
      - Type subtask summary and press Enter to create
      - Click subtask key to open subtask detail
      - Click status badge to change subtask status
      - Click priority icon to change subtask priority
      - Click row actions menu to delete a subtask
      - Confirm delete in the Atlaskit modal dialog
      - Click collapse chevron to collapse the subtasks section
      - Click column picker to toggle visible columns
    api_calls:
      - method: SELECT
        endpoint: supabase:ph_issues?parent_key=eq.storyKey
      - method: INSERT
        endpoint: supabase:ph_issues
      - method: UPDATE
        endpoint: supabase:ph_issues
      - method: UPDATE
        endpoint: supabase:ph_issues soft delete
    auth_required: true

  - name: All Work Toolbar - Issue Detail Panel
    description: Project all-work list with integrated issue detail overlay. Supports opening story/subtask detail. Navigation arrows, panel/full-page mode toggle.
    files:
      - src/pages/project-hub/jira-list/components/AllWorkToolbar.tsx
    entry_route: /project-hub/BAU/allwork
    user_interactions:
      - Click any work item row to open detail panel
      - Navigate between items using prev/next arrows
      - Toggle panel mode
      - Close the detail panel
      - Use URL deep-link to open specific issue
    api_calls:
      - method: SELECT
        endpoint: supabase:ph_issues
    auth_required: true

known_limitations:
  - issue: BoardView and ViewToggle files still exist but are no longer imported - dead code
    location: src/modules/project-work-hub/components/SubtasksPanel/BoardView.tsx
    impact: No runtime impact
  - issue: DnD row reorder wired but not connected to JiraTable
    location: src/modules/project-work-hub/components/SubtasksPanel/index.tsx
    impact: Users cannot drag-reorder subtasks
