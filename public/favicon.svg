<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Catalyst Convergence Hub - Favicon (Simplified for 16px) -->
    <defs>
        <linearGradient id="catalystBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3b82f6"/>
            <stop offset="100%" style="stop-color:#1d4ed8"/>
        </linearGradient>
    </defs>
    <!-- Simplified: thicker lines, merged at small size -->
    <line x1="50" y1="50" x2="18" y2="18" stroke="#93c5fd" stroke-width="10" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="82" y2="18" stroke="#93c5fd" stroke-width="10" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="18" y2="82" stroke="#93c5fd" stroke-width="10" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="82" y2="82" stroke="#93c5fd" stroke-width="10" stroke-linecap="round"/>
    <!-- Center hub only (nodes implied by lines at small size) -->
    <circle cx="50" cy="50" r="24" fill="url(#catalystBlue)"/>
</svg>
