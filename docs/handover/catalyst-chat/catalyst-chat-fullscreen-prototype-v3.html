<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalyst Chat — Full-Screen Prototype (Iteration 1)</title>
<style>
/* ============ TOKEN CONTRACT — per implementation spec ============ */
:root{
  --c-chat-app-rail-w:72px;
  --c-chat-sidebar-w-expanded:220px;
  --c-chat-sidebar-w-collapsed:56px;
  --c-chat-sidebar-transition-duration:180ms;
  --c-chat-sidebar-transition-easing:ease;
  --c-chat-thread-w-lg:400px;
  --c-chat-thread-w-md:360px;
  --c-chat-header-h:64px;
  --c-chat-tabs-h:44px;
  --c-chat-page-pad-x:24px;
  --c-chat-page-pad-y:16px;
  --c-chat-list-row-h:56px;
  --c-chat-avatar:36px;
  --c-chat-thread-avatar:32px;
  --c-chat-inline-chip-h:22px;
  --c-chat-reaction-pill-h:24px;
  --c-chat-hover-toolbar-h:32px;
  --c-chat-group-gap-y:12px;
  --c-chat-intra-group-gap-y:2px;
  --c-chat-focus-ring-w:2px;
  /* ADS-mapped color tokens (light) */
  --c-chat-surface:#FFFFFF;
  --c-chat-surface-raised:#FFFFFF;
  --c-chat-surface-sunken:#F7F8F9;
  --c-chat-border:#DFE1E6;
  --c-chat-text:#172B4D;
  --c-chat-text-subtle:#44546F;
  --c-chat-text-subtlest:#626F86;
  --c-chat-hover-bg:rgba(9,30,66,0.06);
  --c-chat-pressed-bg:rgba(9,30,66,0.12);
  --c-chat-selected-bg:#E9F2FF;
  --c-chat-accent:#0C66E4;
  --c-chat-accent-hover:#0055CC;
  --c-chat-accent-subtle:#E9F2FF;
  --c-chat-unread:#AE2E24;
  --c-chat-focus:#388BFF;
  --c-chat-badge:#CA3521;
  --c-chat-success:#22A06B;
  --c-chat-warning-bg:#FFF7D6;
  --c-chat-warning-border:#E2B203;
  --c-chat-danger-bg:#FFECEB;
  --font-stack:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",Ubuntu,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-stack);color:var(--c-chat-text);font-size:14px;background:var(--c-chat-surface);overflow:hidden}
button{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit}
button:focus-visible,[tabindex]:focus-visible,a:focus-visible,input:focus-visible{outline:var(--c-chat-focus-ring-w) solid var(--c-chat-focus);outline-offset:1px;border-radius:4px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:rgba(9,30,66,.18);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ============ SHELL GRID ============ */
.c-chat-shell{
  display:grid;height:100vh;background:var(--c-chat-surface);
  grid-template-columns:var(--c-chat-app-rail-w) var(--c-chat-sidebar-w-expanded) minmax(0,1fr) 0;
}
.c-chat-shell[data-sidebar-collapsed="true"]{grid-template-columns:var(--c-chat-app-rail-w) var(--c-chat-sidebar-w-collapsed) minmax(0,1fr) 0}
.c-chat-shell[data-thread-mode="docked-md"]{grid-template-columns:var(--c-chat-app-rail-w) var(--c-chat-sidebar-w-expanded) minmax(0,1fr) var(--c-chat-thread-w-md)}
.c-chat-shell[data-thread-mode="docked-md"][data-sidebar-collapsed="true"]{grid-template-columns:var(--c-chat-app-rail-w) var(--c-chat-sidebar-w-collapsed) minmax(0,1fr) var(--c-chat-thread-w-md)}
.c-chat-shell[data-thread-mode="docked-lg"]{grid-template-columns:var(--c-chat-app-rail-w) var(--c-chat-sidebar-w-expanded) minmax(0,1fr) var(--c-chat-thread-w-lg)}
.c-chat-shell[data-thread-mode="docked-lg"][data-sidebar-collapsed="true"]{grid-template-columns:var(--c-chat-app-rail-w) var(--c-chat-sidebar-w-collapsed) minmax(0,1fr) var(--c-chat-thread-w-lg)}

/* ============ APP RAIL ============ */
.c-rail{display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;border-right:1px solid var(--c-chat-border);background:var(--c-chat-surface)}
.c-rail__logo{width:36px;height:36px;border-radius:8px;background:#0C66E4;color:#fff;font-weight:700;font-size:18px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.c-rail__btn{width:56px;padding:6px 0 4px;border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--c-chat-text-subtle);position:relative}
.c-rail__btn svg{width:20px;height:20px}
.c-rail__btn span{font-size:11px;line-height:14px;font-weight:500}
.c-rail__btn:hover{background:var(--c-chat-hover-bg)}
.c-rail__btn[aria-current="page"]{color:var(--c-chat-accent);background:var(--c-chat-selected-bg)}
.c-rail__badge{position:absolute;top:0;right:6px;min-width:18px;height:18px;border-radius:9px;background:var(--c-chat-badge);color:#fff;font-size:11px;line-height:16px;font-weight:700;padding:1px 5px;border:1px solid #fff}
.c-rail__avatar{margin-top:auto;width:32px;height:32px;border-radius:50%;background:#216E4E;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ============ CONVERSATION SIDEBAR ============ */
.c-chat-sidebar{min-width:0;border-right:1px solid var(--c-chat-border);display:flex;flex-direction:column;background:var(--c-chat-surface);overflow:hidden;transition:width var(--c-chat-sidebar-transition-duration) var(--c-chat-sidebar-transition-easing)}
.c-sb-head{height:var(--c-chat-header-h);flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 12px 0 16px;border-bottom:1px solid var(--c-chat-border)}
.c-sb-head h1{font-size:20px;line-height:28px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sb-head__actions{display:flex;gap:2px}
.c-sb-head button{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--c-chat-text-subtle)}
.c-sb-head button:hover{background:var(--c-chat-hover-bg)}
.c-sb-scroll{flex:1;overflow-y:auto;padding:8px 0 16px}
.c-sb-section{margin-top:4px}
.c-sb-section__head{display:flex;align-items:center;gap:4px;width:100%;height:32px;padding:0 12px;font-size:13px;line-height:16px;font-weight:600;color:var(--c-chat-text-subtle);text-align:left;border-radius:4px}
.c-sb-section__head:hover{background:var(--c-chat-hover-bg)}
.c-sb-section__head .chev{transition:transform 120ms;flex:none}
.c-sb-section__head[aria-expanded="false"] .chev{transform:rotate(-90deg)}
.c-sb-section__count{margin-left:auto;font-size:11px;font-weight:600;color:var(--c-chat-text-subtlest)}
.c-sb-row{position:relative;display:flex;align-items:center;gap:10px;width:100%;height:var(--c-chat-list-row-h);padding:0 12px 0 16px;text-align:left;border-radius:0}
.c-sb-row:hover{background:var(--c-chat-hover-bg)}
.c-sb-row[aria-current="page"]{background:var(--c-chat-selected-bg)}
.c-sb-row[aria-current="page"]::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 2px 2px 0;background:var(--c-chat-accent)}
.c-sb-row__icon{flex:none;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.c-sb-row__icon--hash{background:transparent;color:var(--c-chat-text-subtle);font-size:16px;border:1px solid var(--c-chat-border)}
.c-sb-row__main{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.c-sb-row__title{font-size:14px;line-height:20px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sb-row[data-unread="true"] .c-sb-row__title{font-weight:600}
.c-sb-row__preview{font-size:13px;line-height:18px;color:var(--c-chat-text-subtlest);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sb-row[data-unread="true"] .c-sb-row__preview{color:var(--c-chat-text-subtle)}
.c-sb-row__meta{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.c-sb-row__ts{font-size:11px;line-height:14px;color:var(--c-chat-text-subtlest)}
.c-sb-row__badge{min-width:18px;height:18px;border-radius:9px;background:var(--c-chat-badge);color:#fff;font-size:11px;line-height:16px;font-weight:700;padding:1px 6px;text-align:center}
.c-sb-row--archived{opacity:.65}
.c-sb-row--archived .c-sb-row__title{font-style:italic}
.c-sb-row__actions{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:none;background:var(--c-chat-surface-raised);border:1px solid var(--c-chat-border);border-radius:6px;box-shadow:0 1px 3px rgba(9,30,66,.15)}
.c-sb-row:hover .c-sb-row__actions,.c-sb-row:focus-within .c-sb-row__actions{display:flex}
.c-sb-row__actions button{width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--c-chat-text-subtle);border-radius:5px}
.c-sb-row__actions button:hover{background:var(--c-chat-hover-bg)}
.c-presence{position:absolute;width:9px;height:9px;border-radius:50%;border:2px solid #fff;bottom:-1px;right:-1px;background:#8993A4}
.c-presence--on{background:var(--c-chat-success)}
/* collapsed sidebar */
[data-sidebar-collapsed="true"] .c-sb-head h1,[data-sidebar-collapsed="true"] .c-sb-head__actions .hide-collapsed{display:none}
[data-sidebar-collapsed="true"] .c-sb-section__head span.lbl,[data-sidebar-collapsed="true"] .c-sb-section__count{display:none}
[data-sidebar-collapsed="true"] .c-sb-row{padding:0;justify-content:center}
[data-sidebar-collapsed="true"] .c-sb-row__main,[data-sidebar-collapsed="true"] .c-sb-row__meta,[data-sidebar-collapsed="true"] .c-sb-row__actions{display:none}
[data-sidebar-collapsed="true"] .c-sb-row[data-unread="true"]::after{content:attr(data-unread-count);position:absolute;top:6px;right:6px;min-width:16px;height:16px;border-radius:8px;background:var(--c-chat-badge);color:#fff;font-size:10px;line-height:15px;font-weight:700;padding:0 4px;text-align:center}
[data-sidebar-collapsed="true"] .c-sb-section__head{justify-content:center;padding:0}

/* ============ MAIN SURFACE ============ */
.c-chat-main{min-width:0;display:grid;grid-template-rows:var(--c-chat-header-h) var(--c-chat-tabs-h) minmax(0,1fr) auto;background:var(--c-chat-surface)}
.c-main-head{display:flex;align-items:center;gap:12px;padding:0 var(--c-chat-page-pad-x);border-bottom:1px solid var(--c-chat-border)}
.c-main-head__icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex:none}
.c-main-head__title{font-size:20px;line-height:28px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-main-head__members{display:flex;align-items:center;gap:6px;padding:4px 8px;border:1px solid var(--c-chat-border);border-radius:6px;font-size:13px;font-weight:600;color:var(--c-chat-text-subtle)}
.c-main-head__members:hover{background:var(--c-chat-hover-bg)}
.c-facepile{display:flex}
.c-facepile span{width:24px;height:24px;border-radius:50%;border:2px solid #fff;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:-6px}
.c-facepile span:first-child{margin-left:0}
.c-main-head__spacer{flex:1}
.c-main-head__btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--c-chat-text-subtle)}
.c-main-head__btn:hover{background:var(--c-chat-hover-bg)}
.c-arch-lozenge{font-size:11px;font-weight:700;line-height:16px;padding:2px 6px;border-radius:3px;background:#F1F2F4;color:var(--c-chat-text-subtle);text-transform:uppercase}
.c-tabs{display:flex;align-items:flex-end;gap:4px;padding:0 var(--c-chat-page-pad-x);border-bottom:1px solid var(--c-chat-border)}
.c-tab{height:100%;display:flex;align-items:center;gap:6px;padding:0 12px;font-size:14px;font-weight:600;color:var(--c-chat-text-subtle);border-bottom:2px solid transparent;margin-bottom:-1px}
.c-tab:hover{color:var(--c-chat-text)}
.c-tab[aria-selected="true"]{color:var(--c-chat-accent);border-bottom-color:var(--c-chat-accent)}
.c-tab__count{font-size:11px;font-weight:700;background:#F1F2F4;border-radius:8px;padding:1px 6px;color:var(--c-chat-text-subtle)}

/* feed */
.c-feed-wrap{position:relative;min-height:0;display:flex;flex-direction:column}
.c-banner{flex:none;display:flex;align-items:center;gap:8px;padding:8px var(--c-chat-page-pad-x);font-size:13px;font-weight:500;border-bottom:1px solid var(--c-chat-warning-border);background:var(--c-chat-warning-bg);color:#533F04}
.c-banner--archived{background:#F1F2F4;border-bottom-color:var(--c-chat-border);color:var(--c-chat-text-subtle)}
.c-banner button{margin-left:auto;font-weight:600;color:var(--c-chat-accent)}
.c-feed{flex:1;overflow-y:auto;padding:var(--c-chat-page-pad-y) var(--c-chat-page-pad-x)}
.c-day-divider{display:flex;align-items:center;margin:16px 0;gap:0}
.c-day-divider::before,.c-day-divider::after{content:"";flex:1;height:1px;background:var(--c-chat-border)}
.c-day-divider span{height:28px;display:flex;align-items:center;padding:0 10px;border:1px solid var(--c-chat-border);border-radius:14px;background:var(--c-chat-surface-raised);font-size:12px;font-weight:600;color:var(--c-chat-text-subtle);margin:0 8px}
.c-unread-divider{display:flex;align-items:center;margin:12px 0;gap:8px}
.c-unread-divider::before{content:"";flex:1;height:1px;background:var(--c-chat-unread)}
.c-unread-divider span{font-size:11px;font-weight:700;color:#fff;background:var(--c-chat-unread);border-radius:9px;padding:2px 8px;text-transform:uppercase;letter-spacing:.4px}
.c-msg{position:relative;display:flex;gap:12px;padding:4px 8px;margin:0 -8px;border-radius:6px}
.c-msg + .c-msg{margin-top:var(--c-chat-intra-group-gap-y)}
.c-msg--group-start{margin-top:var(--c-chat-group-gap-y)}
.c-msg:hover,.c-msg:focus-within{background:var(--c-chat-hover-bg)}
.c-msg__avatar-col{flex:none;width:var(--c-chat-avatar)}
.c-msg__avatar{width:var(--c-chat-avatar);height:var(--c-chat-avatar);border-radius:8px;color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
.c-msg__ts-gutter{display:none;font-size:11px;color:var(--c-chat-text-subtlest);line-height:22px;text-align:right;width:var(--c-chat-avatar)}
.c-msg:not(.c-msg--group-start):hover .c-msg__ts-gutter{display:block}
.c-msg__body-col{flex:1;min-width:0}
.c-msg__meta{display:flex;align-items:baseline;gap:8px}
.c-msg__author{font-size:15px;line-height:22px;font-weight:600}
.c-msg__time{font-size:12px;line-height:16px;color:var(--c-chat-text-subtlest)}
.c-msg__edited{font-size:11px;color:var(--c-chat-text-subtlest)}
.c-msg__text{font-size:15px;line-height:22px;max-width:78ch;word-wrap:break-word;white-space:pre-wrap}
.c-msg--failed .c-msg__text{opacity:.55}
.c-msg__fail{font-size:12px;font-weight:600;color:var(--c-chat-unread);margin-top:2px}
.c-msg__fail button{color:var(--c-chat-accent);font-weight:600;font-size:12px}
.c-chip{display:inline-flex;align-items:center;height:var(--c-chat-inline-chip-h);padding:0 6px;border-radius:4px;font-size:12px;line-height:18px;font-weight:600;background:var(--c-chat-accent-subtle);color:var(--c-chat-accent);vertical-align:baseline;cursor:pointer;white-space:nowrap}
.c-chip:hover{background:#CCE0FF}
.c-chip--me{background:#FFF0B3;color:#533F04}
.c-chip--ticket{gap:4px;border:1px solid #85B8FF;background:#fff;color:var(--c-chat-accent)}
.c-chip--ticket::before{content:"";width:12px;height:12px;border-radius:2px;background:var(--c-chat-accent);flex:none}
.c-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.c-rx{display:inline-flex;align-items:center;gap:4px;height:var(--c-chat-reaction-pill-h);padding:0 8px;border-radius:999px;border:1px solid var(--c-chat-border);background:var(--c-chat-surface-sunken);font-size:12px;line-height:16px;font-weight:600;color:var(--c-chat-text-subtle)}
.c-rx:hover{border-color:var(--c-chat-text-subtlest)}
.c-rx[data-me="true"]{background:var(--c-chat-accent-subtle);border-color:var(--c-chat-accent);color:var(--c-chat-accent)}
.c-rx--add{padding:0 7px}
.c-thread-foot{display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:3px 8px 3px 4px;border:1px solid transparent;border-radius:6px;font-size:12px;font-weight:600;color:var(--c-chat-accent)}
.c-thread-foot:hover{border-color:var(--c-chat-border);background:var(--c-chat-surface-raised)}
.c-thread-foot .c-facepile span{width:20px;height:20px;font-size:9px;border-width:1.5px}
.c-thread-foot__last{font-weight:400;color:var(--c-chat-text-subtlest)}
.c-thread-foot[data-unread="true"]::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--c-chat-accent)}
/* hover toolbar */
.c-hovertools{position:absolute;top:-16px;right:8px;display:none;align-items:center;gap:4px;height:var(--c-chat-hover-toolbar-h);padding:0 4px;background:var(--c-chat-surface-raised);border:1px solid var(--c-chat-border);border-radius:8px;box-shadow:0 1px 3px rgba(9,30,66,.2);z-index:5}
.c-msg:hover .c-hovertools,.c-msg:focus-within .c-hovertools{display:flex}
.c-hovertools button{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--c-chat-text-subtle)}
.c-hovertools button:hover{background:var(--c-chat-hover-bg)}
.c-jump{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:6px;padding:6px 14px;border-radius:16px;background:var(--c-chat-accent);color:#fff;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(9,30,66,.3);z-index:6}
.c-jump[data-show="true"]{display:flex}
/* composer shell */
.c-composer-shell{padding:0 var(--c-chat-page-pad-x) 16px}
.c-composer{border:1px solid var(--c-chat-border);border-radius:8px;background:var(--c-chat-surface)}
.c-composer:focus-within{border-color:var(--c-chat-accent);box-shadow:0 0 0 1px var(--c-chat-accent)}
.c-composer__toolbar{display:flex;align-items:center;gap:2px;padding:6px 8px;border-bottom:1px solid var(--c-chat-border)}
.c-composer__toolbar button{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--c-chat-text-subtle);font-size:14px}
.c-composer__toolbar button:hover{background:var(--c-chat-hover-bg)}
.c-composer__toolbar .sep{width:1px;height:18px;background:var(--c-chat-border);margin:0 4px}
.c-composer__input{width:100%;border:none;resize:none;font-family:inherit;font-size:15px;line-height:22px;padding:10px 12px;min-height:64px;outline:none;background:transparent;color:var(--c-chat-text)}
.c-composer__foot{display:flex;align-items:center;gap:8px;padding:8px 12px}
.c-composer__send{background:var(--c-chat-accent);color:#fff;font-weight:600;font-size:14px;padding:7px 16px;border-radius:6px}
.c-composer__send:hover{background:var(--c-chat-accent-hover)}
.c-composer__send:disabled{background:#F1F2F4;color:#A5ADBA;cursor:not-allowed}
.c-composer__cancel{font-weight:600;color:var(--c-chat-text-subtle);padding:7px 10px}
.c-composer[data-disabled="true"]{background:var(--c-chat-surface-sunken)}
.c-composer[data-disabled="true"] .c-composer__input{cursor:not-allowed}
/* skeleton + empty */
.c-skel{padding:var(--c-chat-page-pad-y) var(--c-chat-page-pad-x)}
.c-skel__row{display:flex;gap:12px;margin-bottom:18px}
.c-skel__a{width:36px;height:36px;border-radius:8px;background:#F1F2F4;animation:pulse 1.2s infinite}
.c-skel__lines{flex:1}
.c-skel__l{height:12px;border-radius:6px;background:#F1F2F4;margin-bottom:8px;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.c-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--c-chat-text-subtle);text-align:center;padding:24px}
.c-empty__icon{width:48px;height:48px;border-radius:12px;background:var(--c-chat-surface-sunken);display:flex;align-items:center;justify-content:center;font-size:22px}
.c-empty h3{font-size:16px;font-weight:600;color:var(--c-chat-text)}
.c-empty p{font-size:13px;max-width:340px}

/* ============ THREAD PANE ============ */

.c-typing{flex:none;height:20px;padding:0 var(--c-chat-page-pad-x) 2px;font-size:12px;color:var(--c-chat-text-subtlest);display:flex;align-items:center;gap:6px}

.c-typing .dots i{width:4px;height:4px;border-radius:50%;background:var(--c-chat-text-subtlest);animation:typeblink 1.1s infinite}
.c-typing .dots i:nth-child(2){animation-delay:.18s}.c-typing .dots i:nth-child(3){animation-delay:.36s}
@keyframes typeblink{0%,80%,100%{opacity:.25}40%{opacity:1}}
/* read receipts */
.c-seen{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px;font-size:11px;color:var(--c-chat-text-subtlest)}
.c-seen span.av{width:14px;height:14px;border-radius:50%;color:#fff;font-size:7px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
/* toasts */
.c-toasts{position:fixed;top:14px;right:14px;z-index:95;display:flex;flex-direction:column;gap:8px}
.c-toast{width:330px;background:var(--c-chat-surface-raised);border:1px solid var(--c-chat-border);border-left:3px solid var(--c-chat-accent);border-radius:10px;box-shadow:0 6px 20px rgba(9,30,66,.25);padding:10px 12px;display:flex;gap:10px;cursor:pointer;text-align:left;animation:toastIn .18s ease}
.c-toast__av{width:30px;height:30px;border-radius:7px;color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none}
.c-toast__t{font-size:13px;font-weight:700}
.c-toast__p{font-size:12px;color:var(--c-chat-text-subtle);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.c-toast__x{margin-left:auto;flex:none;width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--c-chat-text-subtlest)}
.c-toast__x:hover{background:var(--c-chat-hover-bg)}
@keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
/* Caty */
.c-caty-ic{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#E34935 0%,#AE4787 55%,#6E5DC6 100%);color:#fff;font-weight:800;font-size:12px;display:inline-flex;align-items:center;justify-content:center;flex:none}
.c-caty{position:fixed;inset:0 0 0 auto;width:min(460px,94vw);z-index:85;background:var(--c-chat-surface-raised);border-left:1px solid var(--c-chat-border);box-shadow:-8px 0 24px rgba(9,30,66,.18);display:flex;flex-direction:column}
.c-caty__head{height:var(--c-chat-header-h);flex:none;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--c-chat-border)}
.c-caty__head .t{font-size:16px;font-weight:700}
.c-caty__head .sub{font-size:12px;color:var(--c-chat-text-subtlest)}
.c-caty__head .x{margin-left:auto;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--c-chat-text-subtle)}
.c-caty__head .x:hover{background:var(--c-chat-hover-bg)}
.c-caty__scroll{flex:1;overflow-y:auto;padding:14px 16px}
.c-caty__sect{margin-bottom:16px}
.c-caty__sect h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--c-chat-text-subtlest);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.c-caty__sect h4 .n{background:var(--c-chat-accent-subtle);color:var(--c-chat-accent);border-radius:8px;padding:1px 7px;font-size:11px}
.c-caty__line{display:flex;gap:8px;padding:7px 9px;border:1px solid var(--c-chat-border);border-radius:8px;margin-bottom:6px;font-size:13px;line-height:18px;background:var(--c-chat-surface)}
.c-caty__line .who{font-weight:700;white-space:nowrap}
.c-caty__line .when{margin-left:auto;color:var(--c-chat-text-subtlest);font-size:11px;white-space:nowrap;padding-left:8px}
.c-caty__stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.c-caty__stat{border:1px solid var(--c-chat-border);border-radius:8px;padding:8px 10px;background:var(--c-chat-surface)}
.c-caty__stat .v{font-size:18px;font-weight:700}
.c-caty__stat .l{font-size:11px;color:var(--c-chat-text-subtlest)}
.c-caty__foot{flex:none;display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--c-chat-border);font-size:11px;color:var(--c-chat-text-subtlest)}
.c-caty__foot .regen{margin-left:auto;border:1px solid var(--c-chat-border);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--c-chat-text-subtle)}
.c-caty__foot .regen:hover{background:var(--c-chat-hover-bg)}
</style>
<style>.c-chat-main{grid-template-rows:var(--c-chat-header-h) var(--c-chat-tabs-h) minmax(0,1fr) auto auto}</style>
</head>
<body>
<div class="c-chat-shell" id="shell" data-view="chat" data-sidebar-collapsed="false" data-thread-mode="closed">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1Z"/></svg><span>Home</span>
    </button>
    <button class="c-rail__btn" data-nav="dms" aria-label="Direct messages">

      <span class="c-rail__badge" id="actBadge" hidden>0</span>
    </button>
    <button class="c-rail__btn" id="railLater" data-nav="later" aria-label="Later">

      <span class="c-rail__badge" id="laterBadge" hidden>0</span>
    </button>
    <button class="c-rail__btn" data-nav="people" aria-label="People">

    </button>

  <!-- ===== CONVERSATION SIDEBAR ===== -->
  <aside class="c-chat-sidebar" id="sidebar" aria-label="Conversations">
    <div class="c-sb-head">
      <h1>Conversations</h1>
      <div class="c-sb-head__actions">
        <button class="hide-collapsed" aria-label="New conversation" title="New conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button id="sbCollapse" aria-label="Collapse sidebar" aria-expanded="true" title="Collapse sidebar">

  <!-- ===== MAIN CONVERSATION SURFACE ===== -->

          <input type="text" id="convSearchInput" placeholder="Search messages in this conversation" aria-label="Search messages in this conversation">

        </div>

      <div class="c-banner" id="netBanner" hidden role="alert">

        You're offline. Messages will retry when the connection returns.

      <div class="c-feed" id="feed" role="list" aria-label="Messages" aria-live="polite" tabindex="-1"></div>
      <div class="c-pins" id="pinsView" hidden></div>

    <div class="c-composer-shell" id="mainComposerShell"></div>

          <button id="densDense" aria-pressed="false" class="c-tt" data-tip="Dense layout">≡</button>
        </div>
      </div>
    </div>
    <div class="c-act-body">
      <div class="c-act-list" id="actFeed" role="list"></div>
      <div class="c-act-detail" id="actDetail"></div>
    </div>
  </section>

  <!-- ===== LATER SURFACE ===== -->
  <section class="c-later" id="later" aria-label="Saved for later">
    <header class="c-main-head">
      <div class="c-main-head__icon" style="background:#946F00">

      <div class="c-main-head__title">Later</div>
      <div class="c-main-head__spacer"></div>
    </header>
    <div class="c-later__feed" id="laterFeed"></div>
  </section>

  <!-- ===== THREAD PANE ===== -->
  <aside class="c-chat-threadPane" id="threadPane" aria-label="Thread">
    <div class="c-thread-head">
      <div>
        <div class="c-thread-head__t">Thread</div>
        <div class="c-thread-head__sub" id="threadSub"></div>

      </button>
    </div>
    <div class="c-thread-scroll" id="threadScroll"></div>
    <div class="c-composer-shell" id="threadComposerShell"></div>
  </aside>
</div>

<div class="c-toasts" id="toasts" aria-live="polite"></div>

function renderFeed(opts={}){

 }else if($('convSearchCount')){$('convSearchCount').textContent='';}
 feed.hidden=state.activeTab!=='messages';

  if(c.unreadFrom===m.id&&!unreadPlaced){h+='<div class="c-unread-divider" role="separator" aria-label="New messages" id="unreadAnchor"><span>New</span></div>';unreadPlaced=true;prev=null;}
  const groupStart=!prev||prev.author!==m.author||(m.ts-prev.ts)>5*MIN||m.failed||m.fwd;
  h+=msgRow(m,!!groupStart,c.id,false);prev=m;}
 feed.innerHTML=h;
 const anchorEl=document.getElementById('unreadAnchor');
 if(opts.keepScroll&&state.scrollAnchors[c.id]!=null){feed.scrollTop=state.scrollAnchors[c.id];}

 updateJump();}

/* ---------------- thread pane ---------------- */
function threadMode(){if(!state.thread)return'closed';const w=window.innerWidth;
 if(w>=1680)return'docked-lg';if(w>=1440)return'docked-md';return'overlay';}

 const mode=threadMode();const pane=$('threadPane');
 shell.dataset.threadMode=mode.startsWith('docked')?mode:'closed';
 if(mode==='overlay'){pane.dataset.mode='overlay';pane.style.display='flex';}
 else{pane.removeAttribute('data-mode');pane.style.display='';}
 if(mode==='closed'){pane.style.display='none';}}
function renderThread(){
 if(!state.thread){applyThreadMode();return;}

 if(!parent){closeThread();return;}

 if(replies.length)h+='<div class="c-thread-repliesbar">'+replies.length+(replies.length===1?' reply':' replies')+'</div>';
 let prev=null;

  +' aria-label="'+(o.thread?'Thread reply':'Message')+' input"></textarea>'
  +(o.alsoSend&&!disabled?'<label class="c-alsosend"><input type="checkbox" class="alsosend"> Also send to <b>'+(c.type==='dm'?convName(c):'#'+convName(c))+'</b></label>':'')
  +'<div class="c-composer__foot">'
  +'<button class="c-composer__send" disabled>Send</button>'

  +'</div></div>';
 const ta=root.querySelector('textarea'),send=root.querySelector('.c-composer__send');
 if(disabled)return;
 ta.addEventListener('input',()=>{send.disabled=!ta.value.trim();});
 const doSend=()=>{if(!ta.value.trim())return;
  const also=root.querySelector('.alsosend');
  sendMessage(ta.value.trim(),o,!!(also&&also.checked));ta.value='';send.disabled=true;};
 send.addEventListener('click',doSend);
 root.querySelector('.c-composer__cancel').addEventListener('click',()=>{ta.value='';send.disabled=true;});
 ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});}
function sendMessage(text,o,alsoSend){
 const m=M('m-new-'+(seq++),ME,Date.now(),text);
 if(state.offline||state.failSends)m.failed=true;
 if(o.thread){
  const ref=o.actDetail?state.actSelected:state.thread;
  if(!ref)return;
  const conv=o.conv||ref.conv;
  const parent=msgOf(conv,o.actDetail?ref.msg:ref.msgId);
  parent.replies.push(m);
  if(alsoSend&&!m.failed){MSGS[conv].push(M('m-new-'+(seq++),ME,Date.now(),text));convOf(conv).unreadFrom=null;}
  if(o.actDetail)renderActDetail();else renderThread();
  renderFeed({keepScroll:true});}
 else{MSGS[state.activeConv].push(m);convOf(state.activeConv).unreadFrom=null;renderFeed();feed.scrollTop=feed.scrollHeight;}
 if(!m.failed){const conv=state.activeConv;
  setTimeout(()=>{const c2=convOf(conv);const others=c2.members.filter(x=>x!==ME&&USERS[x].on).slice(0,3);
   if(others.length){m.seenBy=others;if(state.view==='chat'&&state.activeConv===conv)renderFeed({keepScroll:true});}},1800);}
 renderSidebar();}

   +(a.cleared?'':'<button data-actquick="clear" data-actid="'+a.id+'" class="c-tt" data-tip="Clear notification" aria-label="Clear notification"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>')
   +'</span></button>';}

 renderActDetail();renderSidebar();}
function renderActDetail(){

 if(!state.actSelected){d.innerHTML='<div class="c-empty"><div class="c-empty__icon">🧵</div><h3>Select an item</h3><p>Open any notification to read and reply in context without leaving Activity.</p></div>';return;}

/* ---------------- Caty summarize (Gemini gateway placeholder) ---------------- */
function catyLine(m){return '<div class="c-caty-line-row c-caty__line"><span class="who">'+USERS[m.author].name.split(' ')[0]+'</span><span>'+esc(m.body.slice(0,110))+(m.body.length>110?'\u2026':'')+'</span><span class="when">'+rel(m.ts)+'</span></div>';}
function buildCatySummary(convId){
 const c=convOf(convId);const cutoff=Date.now()-7*DAY;
 const win=(MSGS[convId]||[]).filter(m=>m.ts>=cutoff);
 const all=win.length?win:(MSGS[convId]||[]);
 const participants=[...new Set(all.map(m=>m.author))];
 const replies=all.reduce((n,m)=>n+(m.replies?m.replies.length:0),0);
 const decisions=all.filter(m=>m.reactions.some(r=>r.e==='\u2705')||/approved|confirmed|sign-?off|verified|final|granted/i.test(m.body));
 const actions=all.filter(m=>m.author!==ME&&/can you|need|please|block|unblock|pending|\?$/im.test(m.body));
 const mentions=all.filter(m=>m.body.includes('@Vikram Indla'));
 const openThreads=all.filter(m=>m.replies&&m.replies.length&&m.replies[m.replies.length-1].author!==ME);
 const files=all.filter(m=>m.files&&m.files.length);
 function sect(title,items,empty){
  return '<div class="c-caty__sect"><h4>'+title+' <span class="n">'+items.length+'</span></h4>'
   +(items.length?items.slice(0,4).map(catyLine).join(''):'<div class="c-caty__line" style="color:var(--c-chat-text-subtlest)">'+empty+'</div>')+'</div>';}
 return '<div class="c-caty__sect"><div class="c-caty__stats">'
  +'<div class="c-caty__stat"><div class="v">'+all.length+'</div><div class="l">Messages \u00b7 7 days</div></div>'
  +'<div class="c-caty__stat"><div class="v">'+replies+'</div><div class="l">Thread replies</div></div>'
  +'<div class="c-caty__stat"><div class="v">'+participants.length+'</div><div class="l">Participants</div></div>'
  +'</div></div>'
  +sect('Key decisions',decisions,'No decisions detected in this window.')
  +sect('Action items for you',actions,'Nothing waiting on you. Clear runway.')
  +sect('Mentions of you',mentions,'No mentions in the last 7 days.')
  +sect('Open threads',openThreads,'All threads are resolved.')
  +sect('Files shared',files,'No files shared in this window.');}

 pop.innerHTML='<div class="c-caty__head"><span class="c-caty-ic" style="width:30px;height:30px;font-size:15px">C</span>'

function handleMsgAction(btn,m,conv,inThread){

 if(a==='more'){openMsgMenu(btn,m,conv,inThread);return;}
 if(a==='retry'){m.failed=state.offline||state.failSends;repaint(inThread);return;}
 if(a==='editsave'){const ta=document.querySelector('[data-editbox="'+m.id+'"]');
  if(ta&&ta.value.trim()){m.body=ta.value.trim();m.edited=true;}state.editing=null;repaint(inThread);return;}

document.addEventListener('keydown',e=>{

  const ORDER=['rail','sidebar','mainHead','mainTabs','feed','threadPane','mainComposerShell'];
  let idx=ORDER.findIndex(id=>$(id)&&$(id).contains(document.activeElement));
  const dir=e.shiftKey?-1:1;
  for(let i=1;i<=ORDER.length;i++){
   const next=ORDER[(idx+dir*i+ORDER.length*2)%ORDER.length];const el=$(next);
   if(!el)continue;
   const f=el.querySelector('button,[tabindex="0"],textarea')||el;
   if(f&&f.offsetParent!==null){f.focus();break;}}

 if((e.metaKey||e.ctrlKey)&&(e.key==='f'||e.key==='F')&&state.view==='chat'){e.preventDefault();

 if(inInput){if(e.key==='Escape'){if(document.activeElement.id==='convSearchInput'){closeConvSearch();return;}document.activeElement.blur();}return;}

 const focused=document.activeElement;
 if(e.key==='ArrowDown'||e.key==='ArrowUp'){

   :focused.closest('#feed')?[...feed.querySelectorAll('.c-msg')]

  if(rows&&rows.length){e.preventDefault();
   const i=rows.indexOf(focused.closest('.c-sb-row,.c-msg,.c-act-card'));
   const n=rows[Math.min(rows.length-1,Math.max(0,i+(e.key==='ArrowDown'?1:-1)))];

 if(e.key==='Home'||e.key==='End'){
  if(focused.closest('#sbScroll')){e.preventDefault();const rows=[...document.querySelectorAll('#sbScroll .c-sb-row')];
   (e.key==='Home'?rows[0]:rows[rows.length-1]).focus();return;}}
 const msgEl=focused.closest&&focused.closest('.c-msg');
 if(msgEl){const m=msgOf(msgEl.dataset.conv,msgEl.dataset.msg);if(!m)return;
